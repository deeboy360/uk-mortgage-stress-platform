services:
  - type: web
    name: uk-mortgage-stress-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn dashboards.app:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
